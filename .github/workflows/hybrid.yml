name: Pipeline Híbrido

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # --- JOB HOSTED (GitHub Actions) ---
  lint-hosted:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint check
        run: echo "✅ Lint passed — ejecutado en ubuntu-latest (hosted)"

  test-hosted:
    runs-on: ubuntu-latest
    needs: lint-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          echo "🧪 Running unit tests..."
          echo "✅ All tests passed — ejecutado en ubuntu-latest (hosted)"

  # --- JOB SELF-HOSTED (runner local registrado) ---
  build-selfhosted:
    runs-on: [self-hosted, linux, lab5-runner]
    needs: test-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Build project
        run: |
          echo "🔧 Construyendo en runner self-hosted..."
          echo "Runner hostname: $(hostname)"
          echo "Kernel: $(uname -r)"
          echo "Arquitectura: $(uname -m)"
          echo "CPU: $(nproc) cores"
          echo "Memoria: $(free -h | grep Mem | awk '{print $2}')"
      - name: Checklist herramientas
        run: |
          for cmd in curl wget git python3 node; do
            if command -v $cmd &>/dev/null; then
              echo "  ✅ $cmd instalado"
            else
              echo "  ❌ $cmd NO instalado"
            fi
          done

  deploy-selfhosted:
    runs-on: [self-hosted, linux, lab5-runner]
    needs: build-selfhosted
    steps:
      - uses: actions/checkout@v4
      - name: Deploy en infraestructura self-hosted
        run: |
          echo "🚀 Desplegando en infraestructura self-hosted..."
          echo "Directorio de trabajo: $GITHUB_WORKSPACE"
          echo "Commit: $GITHUB_SHA"
          echo "Branch: $GITHUB_REF"
          echo "✅ Deploy completado exitosamente en runner self-hosted"
