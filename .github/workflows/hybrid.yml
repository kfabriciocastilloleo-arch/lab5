name: Pipeline Híbrido

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # --- JOB HOSTED (GitHub Actions) ---
  lint-hosted:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint check
        run: echo "✅ Lint passed — ejecutado en ubuntu-latest (hosted)"

  test-hosted:
    runs-on: ubuntu-latest
    needs: lint-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          echo "🧪 Running unit tests..."
          echo "✅ All tests passed — ejecutado en ubuntu-latest (hosted)"

  # --- JOB SELF-HOSTED ---
  build-selfhosted:
    runs-on: [self-hosted, linux, lab5-runner]
    needs: test-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Build project
        run: |
          echo "🔧 Building on self-hosted runner..."
          echo "Runner: $(uname -a)"
          echo "✅ Build completed — ejecutado en runner self-hosted"

  deploy-selfhosted:
    runs-on: [self-hosted, linux, lab5-runner]
    needs: build-selfhosted
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to self-hosted environment
        run: |
          echo "🚀 Deploying to self-hosted infrastructure..."
          echo "Hostname: $(hostname)"
          echo "✅ Deploy completed — ejecutado en runner self-hosted"
