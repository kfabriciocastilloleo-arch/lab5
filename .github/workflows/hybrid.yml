name: Pipeline Híbrido

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # --- JOB HOSTED (GitHub Actions) ---
  lint-hosted:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint check
        run: echo "✅ Lint passed — ejecutado en ubuntu-latest (hosted)"

  test-hosted:
    runs-on: ubuntu-latest
    needs: lint-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          echo "🧪 Running unit tests..."
          echo "✅ All tests passed — ejecutado en ubuntu-latest (hosted)"

  # --- JOB SELF-HOSTED ---
  build-selfhosted:
    runs-on: ubuntu-latest
    needs: test-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Simular entorno self-hosted
        run: |
          echo "🔧 Construyendo en entorno self-hosted..."
          echo "Hostname: $(hostname)"
          echo "Kernel: $(uname -r)"
          echo "Arquitectura: $(uname -m)"
          echo "CPU: $(nproc) cores"
          echo "Memoria: $(free -h | grep Mem | awk '{print $2}')"
          echo "Disco: $(df -h / | tail -1 | awk '{print $4}') libre"
      - name: Checklist entorno
        run: |
          echo "📋 Verificando herramientas instaladas..."
          for cmd in curl wget git docker python3 node; do
            if command -v $cmd &>/dev/null; then
              echo "  ✅ $cmd instalado"
            else
              echo "  ❌ $cmd NO instalado"
            fi
          done

  deploy-selfhosted:
    runs-on: ubuntu-latest
    needs: build-selfhosted
    steps:
      - uses: actions/checkout@v4
      - name: Simular deploy en self-hosted
        run: |
          echo "🚀 Desplegando en infraestructura self-hosted..."
          echo "Directorio de trabajo: $GITHUB_WORKSPACE"
          echo "SHA del commit: $GITHUB_SHA"
          echo "Ref: $GITHUB_REF"
          echo "✅ Deploy simulado completado exitosamente"
